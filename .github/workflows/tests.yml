name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c
      - name: Register this checkout as the tap
        run: |
          TAP_DIR="$(brew --repository haipham22/tap)"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"
          brew tap
      - name: Audit
        # non-strict: validate URL/sha/homepage correctness without
        # license pedantry (JetBrains Toolbox is proprietary, no SPDX id)
        run: brew audit --online jetbrains-toolbox
      - name: Install + test
        run: |
          brew install jetbrains-toolbox
          brew test jetbrains-toolbox
